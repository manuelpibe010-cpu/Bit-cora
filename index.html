<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;
if (!window.storage) {
  window.storage = {
    async get(k){ try { const v = localStorage.getItem(k); return v == null ? null : { key:k, value:v }; } catch { return null; } },
    async set(k,v){ try { localStorage.setItem(k, v); } catch(e){ alert("No hay espacio de almacenamiento. Borrá alguna foto/registro."); throw e; } return { key:k, value:v }; },
    async delete(k){ try { localStorage.removeItem(k); } catch{} return { key:k, deleted:true }; },
    async list(p){ const keys=[]; for (let i=0;i<localStorage.length;i++){ const key=localStorage.key(i); if(!p||key.startsWith(p)) keys.push(key); } return { keys }; },
  };
}

/* ===================== estilos ===================== */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Semi+Condensed:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --bg:#14161B; --bg2:#1B1E26; --bg3:#232732; --line:#2E323D; --line2:#3A3F4D;
  --txt:#ECEEF2; --mut:#9AA1AD; --mut2:#727A88;
  --accent:#FF6A2B; --accent2:#FF844E;
  --ok:#34D399; --soon:#FBBF24; --over:#F87171;
  --disp:'Barlow Semi Condensed','Barlow',system-ui,sans-serif;
  --body:'Barlow',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.gx{font-family:var(--body);color:var(--txt);background:var(--bg);min-height:100vh;
  display:flex;justify-content:center}
.gx-frame{width:100%;max-width:520px;background:var(--bg);min-height:100vh;
  display:flex;flex-direction:column;position:relative;padding-bottom:78px}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.muted{color:var(--mut)}
.mut2{color:var(--mut2)}
h1,h2,h3{font-family:var(--disp);margin:0;letter-spacing:.2px}

/* topbar */
.top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#171A21 70%,rgba(23,26,33,0));
  padding:14px 16px 12px}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--disp);font-weight:700;
  font-size:18px;letter-spacing:1px;text-transform:uppercase}
.brand .dot{width:9px;height:9px;border-radius:2px;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.vehsel{display:flex;gap:8px;overflow-x:auto;margin-top:12px;padding-bottom:2px;scrollbar-width:none}
.vehsel::-webkit-scrollbar{display:none}
.vchip{flex:0 0 auto;background:var(--bg2);border:1px solid var(--line);color:var(--mut);
  border-radius:11px;padding:8px 12px;font-family:var(--disp);font-weight:600;font-size:13px;
  display:flex;flex-direction:column;gap:1px;min-width:96px;cursor:pointer;transition:.15s}
.vchip .vk{font-family:var(--mono);font-size:10px;color:var(--mut2);font-weight:500}
.vchip.on{border-color:var(--accent);color:var(--txt);background:#23201E}
.vchip.add{align-items:center;justify-content:center;min-width:44px;color:var(--mut2);font-size:20px}

/* odometer */
.odo{margin:12px 16px 4px;background:var(--bg2);border:1px solid var(--line);border-radius:16px;
  padding:16px;display:flex;align-items:center;justify-content:space-between}
.odo .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--mut2)}
.odo .big{font-family:var(--mono);font-weight:700;font-size:30px;line-height:1.05;margin-top:4px}
.odo .big small{font-size:14px;color:var(--mut);font-weight:500;margin-left:4px}
.odo .sub{font-size:12px;color:var(--mut);margin-top:5px}
.odo .sub b{color:var(--accent2);font-family:var(--mono);font-weight:600}

/* buttons */
.btn{font-family:var(--disp);font-weight:600;font-size:14px;border-radius:11px;padding:11px 14px;
  border:1px solid var(--line2);background:var(--bg3);color:var(--txt);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:default}
.btn.acc{background:var(--accent);border-color:var(--accent);color:#1a0f08;font-weight:700}
.btn.ghost{background:transparent;border-color:var(--line)}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px}
.btn.block{width:100%}
.btn.danger{background:transparent;border-color:#5b2b2b;color:var(--over)}
.iconbtn{background:var(--bg3);border:1px solid var(--line);color:var(--mut);border-radius:9px;
  width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}

/* section */
.sec{padding:6px 16px 4px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.sec-h h2{font-size:13px;text-transform:uppercase;letter-spacing:1.6px;color:var(--mut)}
.eyebrow{font-family:var(--mono);font-size:10px;color:var(--accent2);letter-spacing:1px}

/* cards */
.card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px}
.alert{display:flex;gap:11px;align-items:flex-start;border-left:3px solid;border-radius:10px;
  padding:11px 12px;margin-bottom:8px;background:var(--bg2)}
.alert.over{border-color:var(--over);background:rgba(248,113,113,.07)}
.alert.soon{border-color:var(--soon);background:rgba(251,191,36,.06)}
.alert .ttl{font-family:var(--disp);font-weight:600;font-size:14px}
.alert .ds{font-size:12px;color:var(--mut);margin-top:2px}

/* maintenance item row */
.mrow{display:flex;gap:12px;align-items:center}
.gauge{position:relative;width:64px;height:64px;flex:0 0 64px}
.gauge svg{transform:rotate(0);display:block}
.gauge-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-v{font-family:var(--mono);font-weight:700;font-size:14px}
.minfo{flex:1;min-width:0}
.minfo .mn{font-family:var(--disp);font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
.dual{display:flex;gap:14px;margin-top:5px;flex-wrap:wrap}
.dual .d{font-size:12px;color:var(--mut)}
.dual .d .num{font-size:12.5px;color:var(--txt)}
.dual .d.bind .num{color:var(--accent2)}
.pred{font-family:var(--mono);font-size:11px;color:var(--mut2);margin-top:6px}
.pred b{color:var(--soon);font-weight:600}

/* pills */
.pill{font-family:var(--disp);font-weight:700;font-size:10px;letter-spacing:.6px;text-transform:uppercase;
  padding:3px 8px;border-radius:7px;white-space:nowrap}
.pill.ok{background:rgba(52,211,153,.13);color:var(--ok)}
.pill.soon{background:rgba(251,191,36,.14);color:var(--soon)}
.pill.over{background:rgba(248,113,113,.14);color:var(--over)}

const todayISO = () => new Date().toISOString().slice(0, 10);
const parse = (iso) => { const [y, m, d] = iso.split("-").map(Number); return new Date(y, m - 1, d); };
const addMonths = (iso, n) => { const d = parse(iso); d.setMonth(d.getMonth() + n); return d.toISOString().slice(0, 10); };
const addDays = (iso, n) => { const d = parse(iso); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); };
const monthsAgo = (n) => addMonths(todayISO(), -n);
const daysBetween = (a, b) => Math.round((parse(b) - parse(a)) / 86400000);
const fmtKm = (n) => Math.round(n).toLocaleString("es-AR") + " km";
const fmtKmShort = (n) => { const a = Math.abs(n); return a >= 1000 ? (Math.sign(n) < 0 ? "-" : "") + (a / 1000).toFixed(a >= 10000 ? 0 : 1).replace(".", ",") + "k" : Math.round(n).toString(); };
const money = (n) => "$ " + Math.round(n).toLocaleString("es-AR");
const fmtDate = (iso) => { const [y, m, d] = iso.split("-"); return `${d}/${m}/${y}`; };
const MES = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
const monthLabel = (iso) => MES[Number(iso.split("-")[1]) - 1] + " " + iso.split("-")[0].slice(2);
const relMonth = (iso) => { const m = Number(iso.split("-")[1]) - 1, y = iso.split("-")[0]; return ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"][m] + " " + y; };
const clamp = (v, a, b) => Math.max(a, Math.min(v, b));

const KEY = "vmt_state_v2";

async function saveState(s) { try { await window.storage.set(KEY, JSON.stringify(s)); } catch (e) { console.error("save", e); } }
async function savePhoto(id, dataUrl) { try { photoCache.set(id, dataUrl); await window.storage.set("vmt_ph_" + id, dataUrl); } catch (e) { console.error(e); } }
async function getPhoto(id) { if (photoCache.has(id)) return photoCache.get(id); try { const r = await window.storage.get("vmt_ph_" + id); if (r) { photoCache.set(id, r.value); return r.value; } } catch {} return null; }
async function delPhoto(id) { try { photoCache.delete(id); await window.storage.delete("vmt_ph_" + id); } catch {} }

/* ===================== lógica de estado de mantenimiento ===================== */
function itemStatus(vehicle, item) {
  const cur = vehicle.currentKm;
  const t = todayISO();
  let kmRemaining = null, kmProg = null, nextKm = null;
  if (item.intervalKm > 0) {
    nextKm = (item.lastServiceKm || 0) + item.intervalKm;
    kmRemaining = nextKm - cur;
    kmProg = (cur - (item.lastServiceKm || 0)) / item.intervalKm;
  }
  let daysRemaining = null, timeProg = null, nextDate = null;
  if (item.intervalMonths > 0 && item.lastServiceDate) {
    nextDate = addMonths(item.lastServiceDate, item.intervalMonths);
    daysRemaining = daysBetween(t, nextDate);
    const tot = daysBetween(item.lastServiceDate, nextDate);
    timeProg = tot > 0 ? daysBetween(item.lastServiceDate, t) / tot : 0;
  }
  const avg = vehicle.dailyAvgKm > 0 ? vehicle.dailyAvgKm : null;
  const kmDays = kmRemaining != null && avg ? Math.round(kmRemaining / avg) : null;
  const progress = Math.max(kmProg ?? 0, timeProg ?? 0);

  const kmOver = kmRemaining != null && kmRemaining <= 0;
  const timeOver = daysRemaining != null && daysRemaining <= 0;
  const kmSoon = kmRemaining != null && kmRemaining <= Math.max(1000, (item.intervalKm || 0) * 0.1);
  const timeSoon = daysRemaining != null && daysRemaining <= 30;
  let status = "ok";
  if (kmOver || timeOver) status = "overdue";
  else if (kmSoon || timeSoon) status = "soon";

  // ¿qué limita primero? km o tiempo
  let bind = null; // 'km' | 'time'
  const dKm = kmDays, dTime = daysRemaining;
  if (dKm != null && dTime != null) bind = dKm <= dTime ? "km" : "time";
  else if (dKm != null) bind = "km";
  else if (dTime != null) bind = "time";

  const bindingDays = bind === "km" ? dKm : bind === "time" ? dTime : null;
  let pred = null;
  if (status !== "overdue" && bindingDays != null) {
    const target = addDays(t, Math.max(bindingDays, 0));
    const reason = bind === "km" ? "por km" : "por tiempo";
    if (bindingDays <= 45) {
      const rel = bindingDays <= 21 ? `en ~${Math.max(bindingDays, 0)} días` : `en ~${Math.round(bindingDays / 30)} mes(es)`;
      pred = { soon: true, text: `Estimado ${rel} (${reason})` };
    } else {
      pred = { soon: false, text: `Estimado: ${relMonth(target)} (${reason})` };
    }
  }
  return { status, kmRemaining, daysRemaining, kmDays, progress, bind, nextKm, nextDate, pred };
}

function vehicleAlerts(v) {
  return v.maintenanceItems
    .map((it) => ({ it, s: itemStatus(v, it) }))
    .filter((x) => x.s.status !== "ok")
    .sort((a, b) => (a.s.status === "overdue" ? -1 : 1) - (b.s.status === "overdue" ? -1 : 1));
}

function Gauge({ progress, status }) {
  const r = 26, sw = 6, C = 2 * Math.PI * r;
  const p = clamp(progress, 0, 1);
  const off = C * (1 - p);
  const col = status === "overdue" ? "var(--over)" : status === "soon" ? "var(--soon)" : "var(--ok)";
  return (
    <div className="gauge">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r={r} fill="none" stroke="var(--line)" strokeWidth={sw} />
        <circle cx="32" cy="32" r={r} fill="none" stroke={col} strokeWidth={sw} strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={off} transform="rotate(-90 32 32)" />
      </svg>
      <div className="gauge-c">
        <div className="gauge-v" style={{ color: col }}>{status === "overdue" ? "!" : Math.round(p * 100) + "%"}</div>
      </div>
    </div>
  );
}

/* ===================== adjuntar archivos ===================== */
function compressImage(file, maxDim = 1100, q = 0.62) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = (height * maxDim) / width; width = maxDim; }
        else if (height >= width && height > maxDim) { width = (width * maxDim) / height; height = maxDim; }
        const cv = document.createElement("canvas");
        cv.width = width; cv.height = height;
        cv.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(cv.toDataURL("image/jpeg", q));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    fr.onerror = reject;
    fr.readAsDataURL(file);
  });
}
function readPdf(file) {
  return new Promise((resolve, reject) => { const fr = new FileReader(); fr.onload = (e) => resolve(e.target.result); fr.onerror = reject; fr.readAsDataURL(file); });
}

function KmForm({ vehicle, onSave, onClose }) {
  const [km, setKm] = useState(vehicle.currentKm);
  const [date, setDate] = useState(todayISO());
  const save = () => {
    const v = Number(km) || vehicle.currentKm;
    const hist = [...(vehicle.kmHistory || []), { km: v, date }].slice(-12);
    let avg = vehicle.dailyAvgKm;
    if (hist.length >= 2) {
      const first = hist[0], last = hist[hist.length - 1];
      const d = daysBetween(first.date, last.date);
      if (d > 0 && last.km > first.km) avg = Math.max(1, Math.round((last.km - first.km) / d));
    }
    onSave({ ...vehicle, currentKm: Math.max(v, vehicle.currentKm), kmHistory: hist, dailyAvgKm: avg });
  };
  return (
    <Sheet title="Actualizar kilometraje" onClose={onClose}
      footer={<button className="btn acc block" onClick={save}>Guardar lectura</button>}>
      <Field label="Km actuales"><input className="inp num" inputMode="numeric" value={km} onChange={(e) => setKm(e.target.value)} /></Field>
      <Field label="Fecha de la lectura"><input className="inp" type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
      <div className="note">El promedio km/día se recalcula solo con tus lecturas y se usa para estimar cuándo te va a tocar el próximo service.</div>
    </Sheet>
  );
}

function ServiceForm({ vehicle, onSave, onClose }) {
  const [date, setDate] = useState(todayISO());
  const [km, setKm] = useState(vehicle.currentKm);
  const [type, setType] = useState("preventivo");
  const [title, setTitle] = useState("");
  const [notes, setNotes] = useState("");
  const [labor, setLabor] = useState("");
  const [parts, setParts] = useState([{ id: uid(), name: "", brand: "", code: "", place: "", cost: "" }]);
  const [resets, setResets] = useState({});
  const [checklist, setChecklist] = useState({});
  const [atts, setAtts] = useState([]); // {id,kind,name,file,previewUrl}
  const fileRef = useRef();

  const upPart = (id, k, v) => setParts((p) => p.map((x) => (x.id === id ? { ...x, [k]: v } : x)));
  const addPart = () => setParts((p) => [...p, { id: uid(), name: "", brand: "", code: "", place: "", cost: "" }]);
  const rmPart = (id) => setParts((p) => p.filter((x) => x.id !== id));

  const onFiles = async (e) => {
    const files = Array.from(e.target.files || []);
    for (const file of files) {
      if (file.size > 4 * 1024 * 1024 && file.type === "application/pdf") { alert("El PDF supera 4 MB. Probá con uno más liviano o sacale una foto."); continue; }
      const kind = file.type === "application/pdf" ? "pdf" : "image";
      setAtts((a) => [...a, { id: uid(), kind, name: file.name, file, previewUrl: kind === "image" ? URL.createObjectURL(file) : null }]);
    }
    e.target.value = "";
  };
  const rmAtt = (id) => setAtts((a) => { const x = a.find((z) => z.id === id); if (x?.previewUrl) URL.revokeObjectURL(x.previewUrl); return a.filter((z) => z.id !== id); });

  const save = async () => {
    const cleanParts = parts.filter((p) => p.name.trim()).map((p) => ({ ...p, cost: Number(p.cost) || 0 }));
    const total = cleanParts.reduce((s, p) => s + p.cost, 0) + (Number(labor) || 0);
    // procesar adjuntos
    const saved = [];
    for (const a of atts) {
      const data = a.kind === "image" ? await compressImage(a.file) : await readPdf(a.file);
      await savePhoto(a.id, data);
      if (a.previewUrl) URL.revokeObjectURL(a.previewUrl);
      saved.push({ id: a.id, kind: a.kind, name: a.name });
    }
    const svc = {
      id: uid(), vehicleId: vehicle.id, date, km: Number(km) || vehicle.currentKm, type,
      title: title.trim() || (type === "correctivo" ? "Reparación" : "Service"), notes: notes.trim(),
      parts: cleanParts, labor: Number(labor) || 0, totalCost: total,
      checklist, attachments: saved,
    };
    onSave(svc, Object.keys(resets).filter((k) => resets[k]));
  };

  return (
    <Sheet title="Registrar service" onClose={onClose}
      footer={<button className="btn acc block" onClick={save}>Guardar en el historial</button>}>
      <div className="field">
        <label>Tipo</label>
        <div className="seg">
          <button className={type === "preventivo" ? "on" : ""} onClick={() => setType("preventivo")}>Preventivo</button>
          <button className={type === "correctivo" ? "on alt" : ""} onClick={() => setType("correctivo")} style={type === "correctivo" ? { background: "var(--over)", color: "#1a0808" } : {}}>Correctivo</button>
        </div>
      </div>
      <Field label="Título"><input className="inp" value={title} placeholder={type === "correctivo" ? "Ej: Cambio de bomba de agua" : "Ej: Service de aceite y filtros"} onChange={(e) => setTitle(e.target.value)} /></Field>
      <div className="two">
        <Field label="Fecha"><input className="inp" type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
        <Field label="Km"><input className="inp num" inputMode="numeric" value={km} onChange={(e) => setKm(e.target.value)} /></Field>
      </div>

      <div className="sec-h" style={{ margin: "4px 0 8px" }}><h2 style={{ fontSize: 12 }}>Repuestos / insumos</h2><button className="btn ghost sm" onClick={addPart}>+ Agregar</button></div>
      {parts.map((p) => (
        <div key={p.id} className="card" style={{ background: "var(--bg3)", padding: 11 }}>
          <div style={{ display: "flex", gap: 8 }}>
            <input className="inp" style={{ flex: 1 }} placeholder="Repuesto (ej: Filtro de aceite)" value={p.name} onChange={(e) => upPart(p.id, "name", e.target.value)} />
            {parts.length > 1 && <button className="iconbtn" onClick={() => rmPart(p.id)}>✕</button>}
          </div>
          <div className="two" style={{ marginTop: 8 }}>
            <input className="inp" placeholder="Marca" value={p.brand} onChange={(e) => upPart(p.id, "brand", e.target.value)} />
            <input className="inp num" placeholder="Código" value={p.code} onChange={(e) => upPart(p.id, "code", e.target.value)} />
          </div>
          <div className="two" style={{ marginTop: 8 }}>
            <input className="inp" placeholder="Lugar / taller" value={p.place} onChange={(e) => upPart(p.id, "place", e.target.value)} />
            <input className="inp num" inputMode="numeric" placeholder="Precio $" value={p.cost} onChange={(e) => upPart(p.id, "cost", e.target.value)} />
          </div>
        </div>
      ))}
      <Field label="Mano de obra $"><input className="inp num" inputMode="numeric" value={labor} placeholder="0" onChange={(e) => setLabor(e.target.value)} /></Field>

      <div className="field">
        <label>Adjuntar factura / remito / ticket</label>
        <button className="btn ghost block sm" onClick={() => fileRef.current?.click()}>📎 Sumar foto o PDF</button>
        <input ref={fileRef} type="file" accept="image/*,application/pdf" multiple style={{ display: "none" }} onChange={onFiles} />
        {atts.length > 0 && (
          <div className="att">
            {atts.map((a) => (
              <div key={a.id} style={{ position: "relative" }}>
                {a.kind === "image" ? <img className="thumb" src={a.previewUrl} alt="" /> : <span className="filepill">📄 {a.name.slice(0, 14)}</span>}
                <button className="x" style={{ position: "absolute", top: -8, right: -8, width: 22, height: 22, fontSize: 12 }} onClick={() => rmAtt(a.id)}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="field">
        <label>¿Qué mantenimientos pone a cero?</label>
        <div className="toglist">
          {vehicle.maintenanceItems.map((it) => (
            <div key={it.id} className={"tog" + (resets[it.id] ? " on" : "")} onClick={() => setResets((r) => ({ ...r, [it.id]: !r[it.id] }))}>
              <div className="box">{resets[it.id] ? "✓" : ""}</div>{it.name}
            </div>
          ))}
        </div>
        <div className="note">Lo que tildes acá reinicia su contador (km y fecha) → así se actualizan las alertas del tablero.</div>
      </div>

      <div className="field">
        <label>Checklist de control visual</label>
        <div className="chk" style={{ gap: 7 }}>
          {CHECKLIST.map((c) => (
            <span key={c} className={"c" + (checklist[c] ? " on" : "")} style={{ cursor: "pointer", padding: "5px 9px" }} onClick={() => setChecklist((s) => ({ ...s, [c]: !s[c] }))}>
              {checklist[c] ? "✓ " : ""}{c}
            </span>
          ))}
        </div>
      </div>
      <Field label="Notas"><textarea className="ta" value={notes} placeholder="Observaciones del taller, próximos puntos a revisar…" onChange={(e) => setNotes(e.target.value)} /></Field>
    </Sheet>
  );
}

function Expenses({ v, services, expenses, onAdd, onDelete }) {
  const data = useMemo(() => {
    const svc = services.filter((s) => s.vehicleId === v.id).map((s) => ({ id: s.id, date: s.date, amount: s.totalCost, category: s.type, label: s.title, src: "service" }));
    const exp = expenses.filter((e) => e.vehicleId === v.id).map((e) => ({ ...e, src: "exp" }));
    return [...svc, ...exp].sort((a, b) => b.date.localeCompare(a.date));
  }, [services, expenses, v.id]);

  const total = data.reduce((s, x) => s + x.amount, 0);
  const byCat = CATS.map((c) => ({ ...c, total: data.filter((x) => x.category === c.id).reduce((s, x) => s + x.amount, 0) })).filter((c) => c.total > 0).sort((a, b) => b.total - a.total);
  const maxCat = Math.max(1, ...byCat.map((c) => c.total));

  const monthly = useMemo(() => {
    const m = {};
    data.forEach((x) => { const k = x.date.slice(0, 7); m[k] = (m[k] || 0) + x.amount; });
    return Object.keys(m).sort().slice(-6).map((k) => ({ label: monthLabel(k + "-01"), total: Math.round(m[k]) }));
  }, [data]);

  // costo por km: gasto total de mantenimiento / km recorridos conocidos
  const kmDriven = (v.kmHistory && v.kmHistory.length >= 2) ? v.currentKm - v.kmHistory[0].km : null;
  const maint = data.filter((x) => x.category === "preventivo" || x.category === "correctivo").reduce((s, x) => s + x.amount, 0);
  const perKm = kmDriven && kmDriven > 0 ? maint / kmDriven : null;

  return (
    <div className="sec">
      <div className="sec-h"><h2>Gastos</h2><button className="btn acc sm" onClick={onAdd}>+ Gasto</button></div>
      <div className="stats">
        <div className="stat"><div className="sl">Total registrado</div><div className="sv">{money(total)}</div></div>
        <div className="stat"><div className="sl">Costo por km (mant.)</div><div className="sv">{perKm != null ? <>$ {perKm.toFixed(0)}<small>/km</small></> : "—"}</div></div>
      </div>

      {monthly.length > 0 && (
        <div className="card" style={{ paddingBottom: 6 }}>
          <div className="sl" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1.1, color: "var(--mut2)", marginBottom: 8 }}>Gasto mensual</div>
          <MonthlyBars data={monthly} />
        </div>
      )}

      {byCat.length > 0 && (
        <div className="card">
          <div className="sl" style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: 1.1, color: "var(--mut2)", marginBottom: 10 }}>Por categoría</div>
          {byCat.map((c) => (
            <div key={c.id} className="catbar">
              <div className="cl"><span>{c.label}</span><span className="num">{money(c.total)}</span></div>
              <div className="tr"><div className="fl" style={{ width: (c.total / maxCat) * 100 + "%", background: c.color }} /></div>
            </div>
          ))}
        </div>
      )}

      <div className="sec-h" style={{ marginBottom: 8 }}><h2 style={{ fontSize: 12 }}>Movimientos</h2></div>
      {data.length === 0 && <Empty icon="💸" title="Sin gastos" sub="Sumá combustible, seguro o un service" />}
      {data.map((x) => (
        <div key={x.id} className="card" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 13px" }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontFamily: "var(--disp)", fontWeight: 600, fontSize: 14 }}>{x.label || catOf(x.category).label}</div>
            <div className="svc-meta" style={{ marginTop: 2 }}><span>{fmtDate(x.date)}</span><span className="pill cat" style={{ padding: "1px 6px", color: catOf(x.category).color }}>{catOf(x.category).label}</span>{x.src === "service" && <span>· service</span>}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div className="cost" style={{ fontSize: 14 }}>{money(x.amount)}</div>
            {x.src === "exp" && <button className="iconbtn" style={{ width: 28, height: 28, fontSize: 13 }} onClick={() => onDelete(x.id)}>🗑</button>}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ===================== respaldo ===================== */
async function exportBackup(state) {
  const photos = {};
  for (const s of state.services) {
    for (const a of s.attachments || []) {
      const data = await getPhoto(a.id);
      if (data) photos[a.id] = data;
    }
  }
  const backup = { app: "bitacora", version: 2, exportedAt: new Date().toISOString(), state, photos };
  const blob = new Blob([JSON.stringify(backup)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `bitacora-respaldo-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}
async function importBackup(file, onDone) {
  let data;
  try { data = JSON.parse(await file.text()); } catch { alert("El archivo no se pudo leer como respaldo."); return; }
  if (!data || data.app !== "bitacora" || !data.state || !Array.isArray(data.state.vehicles)) { alert("Este archivo no es un respaldo de Bitácora."); return; }
  if (data.photos) { for (const id of Object.keys(data.photos)) { try { await savePhoto(id, data.photos[id]); } catch {} } }
  onDone(data.state);
}

function SettingsSheet({ state, onClose, onImport }) {
  const fileRef = useRef();
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState("");
  const doExport = async () => { setBusy(true); setDone(""); try { await exportBackup(state); setDone("Respaldo descargado ✓"); } catch { alert("No se pudo exportar."); } finally { setBusy(false); } };
  const onFile = async (e) => {
    const f = e.target.files?.[0]; e.target.value = "";
    if (!f) return;
    if (!confirm("Importar va a reemplazar todos los datos actuales por los del respaldo. ¿Continuar?")) return;
    setBusy(true);
    try { await importBackup(f, onImport); } finally { setBusy(false); }
  };
  const photoCount = state.services.reduce((n, s) => n + (s.attachments?.length || 0), 0);
  return (
    <Sheet title="Datos y respaldo" onClose={onClose}>
      <div className="card" style={{ background: "var(--bg3)" }}>
        <div className="svc-meta" style={{ fontSize: 12.5 }}>
          <span>{state.vehicles.length} vehículo(s)</span>
          <span>{state.services.length} service(s)</span>
          <span>{state.expenses.length} gasto(s)</span>
          <span>{photoCount} foto(s)</span>
        </div>
      </div>
      <button className="btn acc block" style={{ marginBottom: 10 }} disabled={busy} onClick={doExport}>⬇ Exportar respaldo (.json)</button>
      <button className="btn ghost block" disabled={busy} onClick={() => fileRef.current?.click()}>⬆ Importar respaldo</button>
      <input ref={fileRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={onFile} />
      {done && <div style={{ color: "var(--ok)", fontFamily: "var(--mono)", fontSize: 12, marginTop: 10, textAlign: "center" }}>{done}</div>}
      <div className="note">El respaldo incluye todo: vehículos, planes de mantenimiento, historial, gastos y las fotos de facturas. Guardalo en Drive o donde quieras; con "Importar" lo restaurás en este u otro teléfono. Importar reemplaza los datos actuales.</div>
    </Sheet>
  );
}

/* ===================== app ===================== */
function App() {
  const [state, setState] = useState(null);
  const [tab, setTab] = useState("tablero");
  const [modal, setModal] = useState(null); // {type, payload}
  const [media, setMedia] = useState(null);

  useEffect(() => { loadState().then((s) => setState(s || buildSeed())); }, []);
  useEffect(() => { if (state) saveState(state); }, [state]);

  if (!state) return <div className="gx"><style>{CSS}</style><div className="gx-frame"><div className="loading">Cargando tu garage…</div></div></div>;

  const v = state.vehicles.find((x) => x.id === state.activeId) || state.vehicles[0];
  const setVehicle = (nv) => setState((s) => ({ ...s, vehicles: s.vehicles.map((x) => (x.id === nv.id ? nv : x)) }));

  const saveVehicle = (nv) => { setState((s) => { const exists = s.vehicles.some((x) => x.id === nv.id); return { ...s, vehicles: exists ? s.vehicles.map((x) => (x.id === nv.id ? nv : x)) : [...s.vehicles, nv], activeId: nv.id }; }); setModal(null); };
  const deleteVehicle = (id) => { if (state.vehicles.length <= 1) { alert("Tiene que quedar al menos un vehículo."); return; } if (!confirm("¿Eliminar este vehículo y su historial?")) return; setState((s) => { const vs = s.vehicles.filter((x) => x.id !== id); return { ...s, vehicles: vs, activeId: vs[0].id, services: s.services.filter((x) => x.vehicleId !== id), expenses: s.expenses.filter((x) => x.vehicleId !== id) }; }); setModal(null); };

  const saveItem = (it) => { setVehicle({ ...v, maintenanceItems: v.maintenanceItems.some((x) => x.id === it.id) ? v.maintenanceItems.map((x) => (x.id === it.id ? it : x)) : [...v.maintenanceItems, it] }); setModal(null); };
  const deleteItem = (id) => { setVehicle({ ...v, maintenanceItems: v.maintenanceItems.filter((x) => x.id !== id) }); setModal(null); };

  const saveService = (svc, resetIds) => {
    setState((s) => {
      const vehicles = s.vehicles.map((veh) => {
        if (veh.id !== v.id) return veh;
        const items = veh.maintenanceItems.map((it) => (resetIds.includes(it.id) ? { ...it, lastServiceKm: svc.km, lastServiceDate: svc.date } : it));
        const hist = svc.km >= veh.currentKm ? [...(veh.kmHistory || []), { km: svc.km, date: svc.date }].slice(-12) : veh.kmHistory;
        return { ...veh, maintenanceItems: items, currentKm: Math.max(veh.currentKm, svc.km), kmHistory: hist };
      });
      return { ...s, vehicles, services: [...s.services, svc] };
    });
    setModal(null);
  };
  const deleteService = (id) => { if (!confirm("¿Eliminar este registro?")) return; const svc = state.services.find((x) => x.id === id); svc?.attachments?.forEach((a) => delPhoto(a.id)); setState((s) => ({ ...s, services: s.services.filter((x) => x.id !== id) })); };

  const saveExpense = (e) => { setState((s) => ({ ...s, expenses: [...s.expenses, e] })); setModal(null); };
  const deleteExpense = (id) => setState((s) => ({ ...s, expenses: s.expenses.filter((x) => x.id !== id) }));

  const alertCount = vehicleAlerts(v).length;

  return (
    <div className="gx">
      <style>{CSS}</style>
      <div className="gx-frame">
        {/* topbar */}
        <div className="top">
          <div className="topbar-row">
            <div className="brand"><span className="dot" />BITÁCORA</div>
            <button className="iconbtn" onClick={() => setModal({ type: "settings" })} aria-label="Datos y respaldo">☰</button>
          </div>
          <div className="vehsel">
            {state.vehicles.map((veh) => (
              <div key={veh.id} className={"vchip" + (veh.id === v.id ? " on" : "")} onClick={() => setState((s) => ({ ...s, activeId: veh.id }))} onDoubleClick={() => setModal({ type: "vehicle", payload: veh })}>
                {veh.name}<span className="vk">{Math.round(veh.currentKm / 1000)}k km</span>
              </div>
            ))}
            <div className="vchip add" onClick={() => setModal({ type: "vehicle" })}>+</div>
          </div>
        </div>

        {/* odometer */}
        <div className="odo">
          <div>
            <div className="lbl">{v.make} {v.model} {v.year ? "· " + v.year : ""}</div>
            <div className="big">{v.currentKm.toLocaleString("es-AR")}<small>km</small></div>
            <div className="sub">Promedio <b>{v.dailyAvgKm} km/día</b>{alertCount > 0 ? ` · ${alertCount} alerta(s)` : " · todo al día"}</div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <button className="btn acc sm" onClick={() => setModal({ type: "km" })}>+ Km</button>
            <button className="iconbtn" onClick={() => setModal({ type: "vehicle", payload: v })}>⚙</button>
          </div>
        </div>

        {/* contenido */}
        {tab === "tablero" && <Dashboard v={v} onAddItem={() => setModal({ type: "item" })} openItem={(it) => setModal({ type: "item", payload: it })} />}
        {tab === "historial" && <History v={v} services={state.services} onAdd={() => setModal({ type: "service" })} onDelete={deleteService} onOpenMedia={setMedia} />}
        {tab === "gastos" && <Expenses v={v} services={state.services} expenses={state.expenses} onAdd={() => setModal({ type: "expense" })} onDelete={deleteExpense} />}

        {/* tabbar */}
        <div className="tabbar">
          <div className="tabbar-in">
            <button className={"tab" + (tab === "tablero" ? " on" : "")} onClick={() => setTab("tablero")}><span className="ic">◔</span>Tablero</button>
            <button className={"tab" + (tab === "historial" ? " on" : "")} onClick={() => setTab("historial")}><span className="ic">≡</span>Historial</button>
            <button className={"tab" + (tab === "gastos" ? " on" : "")} onClick={() => setTab("gastos")}><span className="ic">$</span>Gastos</button>
          </div>
        </div>

        {/* modals */}
        {modal?.type === "vehicle" && <VehicleForm vehicle={modal.payload} onSave={saveVehicle} onClose={() => setModal(null)} onDelete={deleteVehicle} />}
        {modal?.type === "km" && <KmForm vehicle={v} onSave={(nv) => { setVehicle(nv); setModal(null); }} onClose={() => setModal(null)} />}
        {modal?.type === "item" && <ItemForm item={modal.payload} onSave={saveItem} onClose={() => setModal(null)} onDelete={deleteItem} />}
        {modal?.type === "service" && <ServiceForm vehicle={v} onSave={saveService} onClose={() => setModal(null)} />}
        {modal?.type === "expense" && <ExpenseForm vehicle={v} onSave={saveExpense} onClose={() => setModal(null)} />}
        {modal?.type === "settings" && <SettingsSheet state={state} onClose={() => setModal(null)} onImport={(st) => { setState(st); setModal(null); }} />}

        {/* lightbox / pdf */}
        {media && (
          <div className="lb" onClick={() => setMedia(null)}>
            {media.kind === "image" ? <img src={media.url} alt="" /> : (
              <div onClick={(e) => e.stopPropagation()} style={{ textAlign: "center" }}>
                <div style={{ color: "var(--txt)", fontFamily: "var(--mono)", marginBottom: 14 }}>📄 {media.name}</div>
                <a className="btn acc" href={media.url} download={media.name || "documento.pdf"}>Descargar PDF</a>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

const __root = ReactDOM.createRoot(document.getElementById("root"));
__root.render(<App />);

</script>
</body>
</html>
